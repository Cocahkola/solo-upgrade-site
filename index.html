<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo Upgrade</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0b0f2a, #05060d);
  color: white;
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(10, 10, 30, 0.8);
  border-bottom: 1px solid #2b2f55;
}

.logo {
  color: #a855f7;
  font-weight: bold;
}

.links a {
  color: #c7d2fe;
  margin-left: 20px;
  text-decoration: none;
}

.links a:hover {
  color: #60a5fa;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
}

.hero h1 {
  font-size: 60px;
  background: linear-gradient(90deg, #60a5fa, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  color: #aab4ff;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 14px 26px;
  background: linear-gradient(90deg, #3b82f6, #a855f7);
  color: white;
  text-decoration: none;
  border-radius: 10px;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  padding: 50px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  width: 250px;
  border-radius: 12px;
  border: 1px solid #2b2f55;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  color: gray;
}
</style>

</head>

<body>

<div class="navbar">
  <div class="logo">⚔ SOLO UPGRADE</div>
  <div class="links">
    <a href="#">Home</a>
    <a href="terms.html">Terms</a>
    <a href="https://discord.gg/NCNstFVwKG" target="_blank">Discord</a>
  </div>
</div>

<div class="hero">
  <h1>AWAKEN YOUR POWER</h1>
  <p>A world of Gates, Hunters, and endless progression.</p>

  <a class="btn" href="https://discord.gg/NCNstFVwKG">
    Enter the Gate
  </a>
</div>

<div class="cards">
  <div class="card">
    ⚔ Fight monsters and gain XP
  </div>

  <div class="card">
    🌌 Enter dangerous Gates
  </div>

  <div class="card">
    📈 Rank up from E to EX
  </div>
</div>

<footer>
  © Solo Upgrade — Discord RPG Bot
</footer>

</body>
</html>
