<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo Upgrade</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b0f2a, #05060d);
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(10, 10, 30, 0.85);
  border-bottom: 1px solid #2b2f55;
}

.logo {
  color: #a855f7;
  font-weight: bold;
  letter-spacing: 2px;
}

.links a {
  color: #c7d2fe;
  margin-left: 20px;
  text-decoration: none;
}

.links a:hover {
  color: #60a5fa;
}

/* HERO */
.hero {
  text-align: center;
  padding: 140px 20px;
}

.hero h1 {
  font-size: 65px;
  background: linear-gradient(90deg, #60a5fa, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  color: #aab4ff;
  max-width: 600px;
  margin: auto;
  font-size: 18px;
}

.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 14px 30px;
  border-radius: 12px;
  background: linear-gradient(90deg, #3b82f6, #a855f7);
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* CARDS */
.section {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  padding: 60px;
}

.card {
  width: 260px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(99,102,241,0.3);
  border-radius: 14px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px;
  color: #666;
}
</style>

</head>

<body>

<div class="navbar">
  <div class="logo">⚔ SOLO UPGRADE</div>

  <div class="links">
    <a href="/">Home</a>
    <a href="/privacy/">Privacy</a>
    <a href="/terms/">Terms</a>
  </div>
</div>

<div class="hero">
  <h1>AWAKEN YOUR POWER</h1>
  <p>A Discord RPG where Hunters grow stronger through battles, Gates, and evolution.</p>

  <a class="btn" href="https://discord.gg/NCNstFVwKG">
    Enter the Gate
  </a>
</div>

<div class="section">
  <div class="card">⚔ Fight monsters & gain XP</div>
  <div class="card">🌌 Explore dangerous Gates</div>
  <div class="card">📈 Rank up from E → EX</div>
</div>

<footer>
© Solo Upgrade — Discord RPG Experience
</footer>

</body>
</html>
