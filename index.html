<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solo Upgrade</title>

<style>

/* ================= GLOBAL ================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b0f2a, #05060d);
  color: white;
  overflow-x: hidden;
}

/* subtle animated glow background */
.bg-glow {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 20%, rgba(168,85,247,0.15), transparent 40%),
              radial-gradient(circle at 80% 30%, rgba(59,130,246,0.15), transparent 40%),
              radial-gradient(circle at 50% 80%, rgba(99,102,241,0.1), transparent 50%);
  animation: floatGlow 10s ease-in-out infinite alternate;
  z-index: -1;
}

@keyframes floatGlow {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* ================= NAVBAR ================= */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 40px;
  background: rgba(10, 10, 30, 0.7);
  border-bottom: 1px solid rgba(99,102,241,0.3);
  backdrop-filter: blur(12px);
}

.logo {
  color: #a855f7;
  font-weight: bold;
  letter-spacing: 2px;
}

.links a {
  color: #c7d2fe;
  margin-left: 18px;
  text-decoration: none;
  transition: 0.25s;
}

.links a:hover {
  color: #60a5fa;
  text-shadow: 0 0 10px rgba(96,165,250,0.6);
}

/* ================= HERO ================= */
.hero {
  text-align: center;
  padding: 130px 20px 90px;
}

.hero h1 {
  font-size: 72px;
  margin: 0;
  background: linear-gradient(90deg, #60a5fa, #a855f7, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}

.hero p {
  margin-top: 15px;
  color: #aab4ff;
  max-width: 650px;
  margin-left: auto;
  margin-right: auto;
  font-size: 17px;
  line-height: 1.6;
}

/* ================= BUTTON ================= */
.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 14px 32px;
  border-radius: 12px;
  background: linear-gradient(90deg, #3b82f6, #a855f7);
  color: white;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 0 25px rgba(59,130,246,0.35);
  transition: 0.25s;
}

.btn:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 0 35px rgba(168,85,247,0.5);
}

/* ================= FEATURES ================= */
.section {
  display: flex;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
  padding: 60px 20px;
}

.card {
  width: 260px;
  padding: 22px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(99,102,241,0.25);
  border-radius: 14px;
  backdrop-filter: blur(10px);
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-6px);
  border-color: #60a5fa;
  box-shadow: 0 0 20px rgba(96,165,250,0.15);
}

/* ================= FOOTER ================= */
footer {
  text-align: center;
  padding: 40px;
  color: #666;
  font-size: 14px;
}

</style>

</head>

<body>

<div class="bg-glow"></div>

<!-- NAV -->
<div class="navbar">
  <div class="logo">⚔ SOLO UPGRADE</div>

  <div class="links">
    <a href="/">Home</a>
    <a href="/privacy/">Privacy</a>
    <a href="/terms/">Terms</a>
    <a href="https://discord.gg/NCNstFVwKG" target="_blank">Discord</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>AWAKEN YOUR POWER</h1>

  <p>
    A dark RPG world where Hunters rise through Gates,
    battle monsters, and evolve beyond limits.
  </p>

  <a class="btn" href="https://discord.gg/NCNstFVwKG">
    Enter the Gate
  </a>
</div>

<!-- FEATURES -->
<div class="section">

  <div class="card">⚔ Combat monsters & gain XP</div>
  <div class="card">🌌 Explore dangerous Gates</div>
  <div class="card">📈 Rank from E → EX</div>

</div>

<!-- FOOTER -->
<footer>
  © Solo Upgrade — Discord RPG Experience
</footer>

</body>
</html>
